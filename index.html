<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/main.scss " />
    <title>wetter-app</title>
  </head>
  <body>
    <div id="app">
      <div class="action-bar">
      <div class="action-bar__back">
        <button
          data-action="back"
          aria-label="Zurück"
        >
          <img src="${import.meta.env.BASE_URL}back.svg" alt="Zurück" />
        </button></div>

      <div class="action-bar__favorite">
        <button
          data-action="favorite"
          aria-label="Favorit hinzufügen"
        >
          <img src="${import.meta.env.BASE_URL}favorite.svg" alt="Favorit" />
        </button></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
